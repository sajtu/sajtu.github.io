			<div class="page-title-container">

					<h1></h1>

			<div class="page-content-container">



				<div class="page-content">

					<div class="connect-highlight">
						<table height=100% width=100%><td height=100% width=100% valign=middle align=center>CONNECT
						</td></table>
					</div>

					<div class="sub-connect">


					<form action="https://formspree.io/f/xlgyngno" method="POST">
					<table>
						<tr>
							<td align=right nowrap><label><br></lable></td>
							<td><br></td>
						</tr>

						<tr>
							<td align=right nowrap><label>Your Name</lable></td>
							<td><label><input type="text" name="name" required></lable></td>
						</tr>

						<tr>
							<td align=right><label>Your Email</lable></td>
							<td><label><input type="email" name="email" required></lable></td>
						</tr>

						<tr>
							<td align=right><label>Organization</lable></td>
							<td><label><input type="text" name="company"></lable></td>
						</tr>

						<tr>
							<td align=right><label>Reason</lable></td>
							<td><label>

								<select name="reason" required>
									<option value="">Select one...</option>
									<option value="Recruiting / Job Opportunity">Recruiting / Job Opportunity</option>
									<option value="Professional Networking">Professional Networking</option>
									<option value="Technical Question">Technical Question</option>
									<option value="Consulting Inquiry">Consulting Inquiry</option>
									<option value="Other">Other</option>
								</select>
							</lable></td>
						</tr>

						<tr>
							<td align=right valign=top><label>Message</lable></td>
							<td><label><textarea name="message" rows="8" required></textarea></lable></td>
						</tr>

						<tr>
							<td><label></lable></td>
							<td><label>
								<!-- Honeypot spam protection -->
								<input type="text" name="_gotcha" style="display:none">
							</lable></td>
						</tr>

						<tr>
							<td><label></lable></td>
							<td><label>
								<!-- Custom email subject -->
								<input type="hidden" name="_subject" value="New message from SeanTu.org">
								<input type="hidden" name="_next" value="https://sajtu.github.io/connect_success.html">
							</lable></td>
						</tr>

						<tr>
							<td><label></lable></td>
							<td><label><button type="submit" class="nav-cta-button">Send Message</button></lable></td>
						</tr>
					</table>
					</form>
